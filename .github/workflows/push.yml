name: hexun-onenote-push

on:
  schedule:
    # 错开整点（GitHub 在 :00 / :30 高峰常延迟），用非 5 分钟倍数的"冷"分钟
    # 北京 08:07 / 12:03 / 19:07（= UTC 00:07 / 04:03 / 11:07）
    - cron: "7 0 * * *"
    - cron: "3 4 * * *"
    - cron: "7 11 * * *"
  workflow_dispatch:   # 允许在 Actions 页面手动点 "Run workflow"

permissions:
  contents: write       # 需要回写 state.json

concurrency:
  group: hexun-push     # 串行运行，避免两次定时挤一起
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run daily_push
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          MS_REFRESH_TOKEN: ${{ secrets.MS_REFRESH_TOKEN }}
          ONENOTE_SECTION_ID: ${{ secrets.ONENOTE_SECTION_ID }}
          JINTIANKANSHA_COOKIE: ${{ secrets.JINTIANKANSHA_COOKIE }}
          # 仅对 hexun.com 生效；格式 http(s)://[user:pass@]host:port
          # 留空 = 直连（GH 上目前直连被腾讯 EdgeOne 拦，必须配此项）
          HEXUN_PROXY_URL: ${{ secrets.HEXUN_PROXY_URL }}
          STATE_FILE: state.json
        run: python daily_push.py

      - name: Auto-update MS_REFRESH_TOKEN secret if rotated
        if: always()      # 跑失败也试一下，避免 token 丢失
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_FOR_SECRETS }}
        run: |
          if [ -f _new_refresh_token.tmp ]; then
            if [ -z "$GH_TOKEN" ]; then
              echo "::warning::检测到新 refresh_token 但 GH_PAT_FOR_SECRETS 未配置，无法自动更新。请到 Actions 日志找新值手动改 Secret"
              exit 0
            fi
            gh secret set MS_REFRESH_TOKEN --body "$(cat _new_refresh_token.tmp)" --repo "$GITHUB_REPOSITORY"
            rm _new_refresh_token.tmp
            echo "::notice::MS_REFRESH_TOKEN secret 已自动更新"
          fi

      - name: Generate RSS feed
        if: always()      # 即使 daily_push 部分失败，也生成 feed.xml（用现有 items）
        run: |
          if [ -f feed_items.json ]; then
            python gen_feed.py
          else
            echo "feed_items.json 不存在，跳过 RSS 生成（首跑或全失败时正常）"
          fi

      - name: Build EPUB + Send to Kindle
        # 每次 cron 都跑：生成 EPUB → 复制到 docs/ 让 GitHub Pages 公开下载 → 发邮件。
        # 早 08:07 / 中 12:03 / 晚 19:07 三班都发；手动触发也发。
        if: always()
        env:
          KINDLE_EMAIL: ${{ secrets.KINDLE_EMAIL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SEND_EMAIL: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && '1' || '0' }}
        run: python send_to_kindle.py

      - name: Commit state + feed if changed
        if: always()    # 失败时也回写（中途已推送的部分要记录）
        run: |
          # 一次性跟踪 state.json、feed_items.json、push_history.json、docs/ 是否有变化
          CHANGES=$(git status --porcelain state.json feed_items.json push_history.json docs/ 2>/dev/null)
          if [[ -n "$CHANGES" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            # 逐个 add：避免任何一个 pathspec 不匹配时整个 add 失败
            # （git add a b c：若 b 不存在则 a/c 也不被暂存 + 非零退出）
            for f in state.json feed_items.json push_history.json; do
              [ -e "$f" ] && git add "$f"
            done
            [ -d docs ] && git add docs/
            # 看一眼真的暂存了什么，方便日志排查
            echo "--- staged ---"
            git diff --cached --stat
            echo "--------------"
            # 如果实际没暂存到任何东西就跳过 commit，不要让 step 红
            if git diff --cached --quiet; then
              echo "git add 后实际没暂存任何变化（可能是 .gitignore 全部排除），跳过 commit"
              exit 0
            fi
            git commit -m "chore: update state + feed [skip ci]"
            # 重试 push：可能远端在 daily_push 跑期间被人 push 过新 commit，要 rebase 再推
            for i in 1 2 3 4 5; do
              if git push; then
                echo "✓ pushed on attempt $i"
                exit 0
              fi
              echo "push failed (attempt $i), pulling --rebase and retrying..."
              git fetch origin
              git rebase origin/main || git rebase --abort
              sleep $((i * 2))
            done
            echo "::error::push state/feed 反复失败"
            exit 1
          else
            echo "nothing changed in state/feed"
          fi
